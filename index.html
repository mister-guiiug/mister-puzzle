<!doctype html>
<html lang="fr">
  <head>
    <script>
      (function () {
        try {
          var k = 'mister_puzzle_theme';
          var t = localStorage.getItem(k);
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = t === 'dark' || ((t === 'system' || t === null) && sys);
          if (t === 'light') dark = false;
          if (dark) document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="alternate icon" type="image/png" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e1b2e" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Mister Puzzle — suivi collaboratif de puzzles : pièces en direct, photos, checkpoints, graphique, PWA. Partagez un code et avancez à plusieurs."
    />
    <title>Mister Puzzle — progression collaborative</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
