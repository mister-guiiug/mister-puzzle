<!doctype html>
<html lang="fr">
  <head>
    <script>
      (function () {
        try {
          var k = 'mister_puzzle_theme';
          var t = localStorage.getItem(k);
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = t === 'dark' || ((t === 'system' || t === null) && sys);
          if (t === 'light') dark = false;
          if (dark) document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/mister-puzzle/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Suivi collaboratif de vos puzzles en temps réel. Partagez un code, placez des pièces ensemble, estimez le temps restant." />
    <title>Mister Puzzle</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
