<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="mp-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#mp-bg)"/>

  <!-- Puzzle grid 3x3 with tabs -->
  <g fill="#ffffff">
    <!-- Top row -->
    <rect x="9" y="9" width="14" height="14" rx="3"/>
    <circle cx="25.5" cy="16" r="2.5"/> <!-- tab right -->
    <rect x="27" y="9" width="14" height="14" rx="3"/>
    <circle cx="47.5" cy="16" r="2.5"/> <!-- tab right -->
    <rect x="45" y="9" width="14" height="14" rx="3"/>

    <!-- Middle row -->
    <circle cx="16" cy="25.5" r="2.5"/> <!-- tab down -->
    <rect x="9" y="27" width="14" height="14" rx="3"/>
    <circle cx="25.5" cy="34" r="2.5"/> <!-- tab right -->
    <circle cx="34" cy="25.5" r="2.5"/> <!-- tab down -->
    <rect x="27" y="27" width="14" height="14" rx="3" fill="#f3e8ff"/> <!-- center highlighted -->
    <circle cx="47.5" cy="34" r="2.5"/> <!-- tab right -->
    <circle cx="16" cy="42.5" r="2.5"/> <!-- tab down -->
    <rect x="45" y="27" width="14" height="14" rx="3"/>

    <!-- Bottom row -->
    <rect x="9" y="45" width="14" height="14" rx="3"/>
    <circle cx="25.5" cy="52" r="2.5"/> <!-- tab right -->
    <rect x="27" y="45" width="14" height="14" rx="3"/>
    <circle cx="47.5" cy="52" r="2.5"/> <!-- tab right -->
    <rect x="45" y="45" width="14" height="14" rx="3"/>

    <!-- Center accent -->
    <circle cx="32" cy="32" r="4" fill="#8b5cf6"/>
  </g>
</svg>