name: CI

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Client — install, lint, test, build
        env:
          VITE_PUBLIC_SITE_ORIGIN: https://example.github.io
          VITE_FIREBASE_API_KEY: ci-dummy-key
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_DATABASE_URL: https://dummy.firebaseio.com
          VITE_FIREBASE_PROJECT_ID: dummy-ci
          VITE_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000000000
        run: npm ci && npm run lint && npm run test && npm run build

      - name: Server — TypeScript
        run: cd server && npm ci && npx tsc --noEmit
