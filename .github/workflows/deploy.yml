name: Deploy Puzzle Tracker

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './puzzle-tracker/client/package-lock.json'

      - name: Install dependencies (Client)
        run: |
          cd puzzle-tracker/client
          npm install

      - name: Build (Client)
        run: |
          cd puzzle-tracker/client
          npm run build

      - name: Build (Server Verification)
        run: |
          cd puzzle-tracker
          npm install
          cd server
          npx tsc

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './puzzle-tracker/client/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
